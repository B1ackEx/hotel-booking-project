<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>LuxeStay Booking</title>
    <link rel="stylesheet" href="/static/style.css">
</head>

<body>

<div class="bg-glow"></div>

<div class="container">

    <div class="header">
        <h1>🏨 LuxeStay</h1>
        <p>Book your perfect stay in seconds</p>
    </div>

    <form id="bookingForm" class="form">

        <div class="grid">

            <input type="text" name="full_name" placeholder="Full Name" required>
            <input type="email" name="email" placeholder="Email Address" required>

            <input type="text" name="phone" placeholder="Phone Number" required>

            <select name="room_type" required>
                <option value="">Select Room Type</option>
                <option>Standard Room</option>
                <option>Deluxe Suite</option>
                <option>Luxury Penthouse</option>
            </select>

            <input type="date" name="check_in" required>
            <input type="date" name="check_out" required>

            <input type="number" name="guests" placeholder="Guests" required>

        </div>

        <textarea name="special_requests" placeholder="Special Requests (optional)"></textarea>

        <button type="submit" id="submitBtn">Confirm Booking ✨</button>

    </form>

</div>

<!-- LOADING -->
<div id="loading" class="loading hidden">
    <div class="spinner"></div>
    <p>Processing your booking...</p>
</div>

<!-- SUCCESS POPUP -->
<div id="popup" class="popup hidden">
    <div class="popup-box">
        <h2>🎉 Booking Confirmed!</h2>
        <p>Your reservation is saved successfully.</p>
        <button onclick="closePopup()">OK</button>
    </div>
</div>

<script>
const form = document.getElementById("bookingForm");
const loading = document.getElementById("loading");
const popup = document.getElementById("popup");

form.addEventListener("submit", async (e) => {
    e.preventDefault();

    loading.classList.remove("hidden");

    const formData = new FormData(form);

    const res = await fetch("/book", {
        method: "POST",
        body: formData
    });

    loading.classList.add("hidden");

    if (res.ok) {
        popup.classList.remove("hidden");
        form.reset();
    } else {
        alert("Booking failed!");
    }
});

function closePopup() {
    popup.classList.add("hidden");
}
</script>

</body>
</html>
